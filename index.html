<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffb6c1; font-family: 'Dancing Script', cursive;
            overflow: hidden; color: white;
        }
        .container { text-align: center; }

        /* GIF STİLİ */
        .gift-gif {
            width: 200px; /* Bilgisayarda görünecek boyut */
            height: auto;
            margin-bottom: 20px; /* Altındaki sayaç/butonla arasına boşluk */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hediye Butonu Stili */
        .gift-button {
            display: none; 
            padding: 20px 50px; font-size: 32px;
            color: #ff4d4d; background-color: white; border: none;
            border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            cursor: pointer; transition: 0.3s; animation: pulse 1.5s infinite;
        }

        /* Geri Sayım Stili */
        #countdown {
            display: block;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .timer-text { font-size: 24px; margin-bottom: 10px; }
        #time { font-size: 40px; font-weight: bold; letter-spacing: 2px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* MOBİL UYUMLULUK */
        @media (max-width: 600px) {
            .gift-gif { width: 150px; } /* Mobilde GIF biraz küçülsün */
            #time { font-size: 28px; }
            .timer-text { font-size: 18px; }
            .gift-button { padding: 15px 35px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="giphy.gif" class="gift-gif">

        <div id="countdown">
            <div class="timer-text">Sürprize çok az kaldı...</div>
            <div id="time">00:00:00:00</div>
        </div>

        <button id="giftBtn" class="gift-button" onclick="goAndPlay()">🎁 Hediyeyi Gör</button>
    </div>

    <audio id="startMusic" src="music/WhatsApp Audio 2026-05-11 at 22.12.29.aac"></audio>

    <script>
        const targetDate = new Date("May 12, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("time").innerHTML = days + "g " + hours + "s " + minutes + "d " + seconds + "sn ";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("giftBtn").style.display = "inline-block";
            }
        }, 1000);

        function goAndPlay() {
            var audio = document.getElementById("startMusic");
            audio.play();
            setTimeout(function() {
                window.location.href = "mektup.html";
            }, 500);
        }
    </script>
</body>
</html>
